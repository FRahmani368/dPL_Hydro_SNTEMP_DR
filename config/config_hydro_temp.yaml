### neural network configuration
NN_model_name: "LSTM"   # it can be "MLP", "LSTM" too.
loss_function: "RmseLoss_flow_comb"      # "RmseLoss_flow_temp",      "RmseLoss_flow_temp_BFI_PET", "RmseLoss_flow_comb"
loss_function_weights:
    w1: 9.0      # w1: flow loss weight
    w2: 1.0
target: [ "00060_Mean", "00010_Mean", "BFI_AVE", "PET"]     #
tRange: [19800101, 20230101]
t_train: [20050101, 20080101]   # there should be an overlap because of the warm_up
t_val: [20101001, 20111001]
t_test: [19990101, 20230101]    # the first year is for warm_up
warm_up: 365
rho: 365
batch_size: 25
EPOCHS: 1
hidden_size: 256
dropout: 0.5
saveEpoch: 1
no_basins: 20
varT_NN: ['dayl(s)', 'prcp(mm/day)', 'tmax(C)', 'tmin(C)', 'vp(Pa)','srad(W/m2)']
varC_NN: [
  'ELEV_MEAN_M_BASIN',  'ELEV_STD_M_BASIN',
  'SLOPE_PCT', 'DRAIN_SQKM', 'NDAMS_2009', 'MAJ_NDAMS_2009',
  'FRAGUN_BASIN', 'FORESTNLCD06',  'AWCAVE', 'PERMAVE', 'BDAVE',
  'ROCKDEPAVE', 'CLAYAVE', 'SILTAVE', 'SANDAVE', 'HGA', 'HGB',
  'HGC', 'HGVAR', 'HGD', 'PPTAVG_BASIN', 'SNOW_PCT_PRECIP',
  'PRECIP_SEAS_IND', 'T_AVG_BASIN',  'T_MAX_BASIN',
  'T_MAXSTD_BASIN', 'RH_BASIN',
  'GEOL_REEDBUSH_DOM_PCT', 'GEOL_REEDBUSH_DOM',
   'HIRES_LENTIC_PCT', 'PERDUN', 'PERHOR', 'RIP100_FOREST'
]

### process based stream temperature model configuration
temp_model_name: "SNTEMP"       #   "None" means no temperature model
routing_temp_model: True
res_time_type: "SNTEMP"   #"van Vliet"  # "van Vliet", "Meisner", "SNTEMP"
res_time_lenF_ssflow: 30   #60
res_time_lenF_gwflow: 365 #
res_time_lenF_srflow: 1
lat_temp_adj: False
shade_smoothening: False
frac_smoothening_mode: False
frac_smoothening_gw_filter_size: 40
frac_smoothening_ss_filter_size: 40
STemp_default_emissivity_veg: 0
STemp_default_albedo: 0.1
STemp_default_delta_Z: 1.0       # for streambed conduction

params_water_density: 1000
params_C_w: 4184    # J/kg. K
NEARZERO: 1e-10
Epan_coef: 1.0

initial_values_shade_fraction: 0.1
varT_temp_model: ['tmax(C)', 'tmin(C)','dayl(s)', "t_monthly(C)", "ccov",
              'prcp(mm/day)', 'vp(Pa)', "srad(W/m2)", "dayofyear"]
varC_temp_model: ["stream_length_square", 'PPTAVG_BASIN', 'SLOPE_PCT',
              'ELEV_MEAN_M_BASIN', "RIP100_FOREST", "lat"]


### process based streamflow model configurations
hydro_model_name: "HBV"  # it can be marrmot_PRMS, HBV, or None -> "None" means no hydrology model
varT_hydro_model: ['prcp(mm/day)', 'tmax(C)', 'tmin(C)', "t_monthly(C)", 'dayl(s)', "dayofyear"]
varC_hydro_model: ['DRAIN_SQKM', "lat"]
routing_hydro_model: True

### PET model configurations
potet_module: "potet_hargreaves" # "potet_hamon"  # "potet_hargreaves" , "dataset" -> Hamon is not ready beacause of lack of monthly coef
potet_dataset_name: "PET_hargreaves(mm/day)" # if "potet_module" == "dataset"

