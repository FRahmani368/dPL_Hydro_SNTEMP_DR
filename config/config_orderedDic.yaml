doNorm: [True, False]
rmNan: [True, False]
daObs: 0
damean: False
davar: 'StreamTemp'
dameanopt: 0
lckernel: None
fdcopt: False

rho: 365
batch_size: 336
EPOCHS: 300
hidden_size: 256
dropout: 0.5
saveEpoch: 20

seq_lin_layers_hidden_size: 256

res_time_type: "Meisner"   #"van Vliet"  # "van Vliet", "Meisner", "SNTEMP"
res_time_lenF_ssflow: 1   #60
res_time_lenF_gwflow: 30 #
res_time_lenF_srflow: 1
lat_temp_adj: "False"
shade_smoothening: "False"

frac_smoothening_mode: "True"
frac_smoothening_gw_filter_size: 40
warm_up: 365
make_sr_masked_by_precip: "False"
params_target: ["res_time_srflow", "res_time_ssflow", "res_time_gwflow"]
one_param_target: ["shade_fraction"]
STemp_default_shade_fraction: 0.05
STemp_default_longwave_reflect_fraction: 0.0
STemp_default_cloud_fraction: 0.1
STemp_default_emissivity_veg: 0
STemp_default_shade_fraction_riparian: 0.5
STemp_default_albedo: 0.1
STemp_default_delta_Z: 1.0       # for streambed conduction

params_water_density: 1000
params_C_w: 4184    # J/kg. K
NEARZERO: 1e-10
Epan_coef: 1.0

routing: True
No_prms_params: 18

initial_values_shade_fraction: 0.1
no_basins: 336
potet_module: "potet_hamon"
srunoff_module: "srunoff_smidx"   # the nonlinear method, "srunoff_carea" linear method
Dprst_flag: 1      # Dprst_flag = 1 means depression storage simulation is computed ( 0= no, 1 = yes)
static_params_list: []
semi_static_params_list: []
method_for_semi_static_param: ["average", "average", "average", "average"]
interval_for_semi_static_param: [30, 30]
